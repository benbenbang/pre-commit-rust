name: "pull request workflow"

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-labeler:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: pr labeler
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

  self-test:
    runs-on: ubuntu-latest
    container: ghcr.io/benbenbang/r-prek
    permissions:
      contents: read
      packages: read
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: self-test hooks
        run: prek try-repo $GITHUB_WORKSPACE --all-files --verbose
        working-directory: tests/fixtures/hello
    env:
      CARGO_TERM_COLOR: always
